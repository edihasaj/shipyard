version: 2

project_name: shipyard

before:
  hooks:
    - go mod tidy

builds:
  - id: shipyard
    main: .
    binary: shipyard
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: shipyard
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - name: shipyard
    repository:
      owner: edihasaj
      name: homebrew-tap
    homepage: "https://github.com/edihasaj/shipyard"
    description: "Point an agent at a repo + task and run an end-to-end ship pipeline"
    license: "MIT"
    install: |
      bin.install "shipyard"
    test: |
      system "#{bin}/shipyard", "--version"

release:
  github:
    owner: edihasaj
    name: shipyard
